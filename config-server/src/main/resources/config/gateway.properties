server.port=8080

management.endpoints.web.exposure.include=env,health,info,prometheus,metrics

spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods[0]=GET
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods[1]=POST
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods[2]=PUT
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods[3]=DELETE
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods[4]=OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*

spring.cloud.gateway.routes[0].id=api
spring.cloud.gateway.routes[0].uri=lb://api
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/hotels/**

# Swagger UI routes
spring.cloud.gateway.routes[1].id=api-swagger-ui
spring.cloud.gateway.routes[1].uri=lb://api
spring.cloud.gateway.routes[1].predicates[0]=Path=/swagger-ui.html

spring.cloud.gateway.routes[2].id=api-swagger-resources
spring.cloud.gateway.routes[2].uri=lb://api
spring.cloud.gateway.routes[2].predicates[0]=Path=/swagger-ui/**

spring.cloud.gateway.routes[3].id=api-openapi-docs
spring.cloud.gateway.routes[3].uri=lb://api
spring.cloud.gateway.routes[3].predicates[0]=Path=/v3/api-docs/**

eureka.client.serviceUrl.defaultZone=http://discovery-server:8761/eureka/
